name: Update odds and results
on:
  schedule:
    # UTC, July only. Midday odds refresh, then around the match windows
    # (UK kickoffs are 8pm–2am, so full-time lands 22:30–04:30 UTC).
    - cron: "0 12 * 7 *"
    - cron: "30 22,23,0,1,4 * 7 *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node scripts/fetch-odds.mjs
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - run: node scripts/fetch-results.mjs
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      - run: node scripts/fetch-hype.mjs
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      - run: |
          git config user.name "odds-bot"
          git config user.email "actions@users.noreply.github.com"
          git add odds.json results.json hype.json
          git diff --cached --quiet || { git commit -m "odds/results update"; git fetch origin main; git rebase origin/main; git push; }
